<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="1200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="630" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="1200" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="400" y2="630" stroke="white" stroke-width="1"/>
  </g>
  <!-- Icon -->
  <text x="600" y="220" text-anchor="middle" font-size="100" fill="white" opacity="0.9">🔧</text>
  <!-- Title -->
  <text x="600" y="330" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800" fill="white">PDF Worker</text>
  <!-- Subtitle -->
  <text x="600" y="400" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">Free Online PDF Tools</text>
  <!-- Features -->
  <text x="600" y="470" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="400" fill="#64748b">Merge · Split · Compress · Convert · Sign · Edit · Protect</text>
  <!-- Privacy badge -->
  <rect x="430" y="510" width="340" height="40" rx="20" fill="white" opacity="0.1"/>
  <text x="600" y="537" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#94a3b8">🔒 Your files never leave your device</text>
</svg>
